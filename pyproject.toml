[tool.pytest.ini_options]
pythonpath = [
    ".",
    "Studio-Portable-RAG/Codebase/ngspice/zmq_server/python",
    "Studio-Portable-RAG/Codebase/ngspice/zmq_server/tests",
]
testpaths = ["tests", "Studio-Portable-RAG/Codebase/ngspice/zmq_server/tests"]
addopts = "-q -p no:launch_testing -p pytest_cov -p pytest_timeout --cov=ingest --cov-report=term-missing --cov-fail-under=95 --timeout=120"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = ["ingest"]
omit = []

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
